name: Tauri Release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            target: ''
          - platform: windows-latest
            args: ''
            target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install

      - name: Build frontend
        run: bun run build

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        env:
          TAURI_ARGS: ${{ matrix.args }}
        run: cargo tauri build $TAURI_ARGS

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.platform }}-${{ matrix.target || 'default' }}
          path: |
            desktop_app/src-tauri/target/release/bundle/dmg/*.dmg
            desktop_app/src-tauri/target/release/bundle/deb/*.deb
            desktop_app/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop_app/src-tauri/target/release/bundle/msi/*.msi
            desktop_app/src-tauri/target/release/bundle/nsis/*.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            desktop_app/src-tauri/target/release/bundle/dmg/*.dmg
            desktop_app/src-tauri/target/release/bundle/deb/*.deb
            desktop_app/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop_app/src-tauri/target/release/bundle/msi/*.msi
            desktop_app/src-tauri/target/release/bundle/nsis/*.exe
